<svg xmlns="http://www.w3.org/2000/svg" width="440" height="430" viewBox="0 0 440 430" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#17212b"/>
      <stop offset="1" stop-color="#0e1621"/>
    </linearGradient>
    <linearGradient id="img" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c4dff"/>
      <stop offset="0.5" stop-color="#448aff"/>
      <stop offset="1" stop-color="#18ffff"/>
    </linearGradient>
  </defs>

  <rect width="440" height="430" rx="16" fill="url(#bg)"/>

  <!-- header -->
  <rect x="0" y="0" width="440" height="56" rx="16" fill="#17212b"/>
  <rect x="0" y="40" width="440" height="16" fill="#17212b"/>
  <circle cx="36" cy="28" r="16" fill="#5288c1"/>
  <text x="36" y="33" fill="#fff" font-size="15" text-anchor="middle">🎨</text>
  <text x="62" y="24" fill="#fff" font-size="14" font-weight="600">Image Bot</text>
  <text x="62" y="40" fill="#6d7f8f" font-size="11">bot</text>

  <!-- user message -->
  <g>
    <rect x="150" y="74" width="270" height="48" rx="14" fill="#2b5278"/>
    <text x="166" y="95" fill="#fff" font-size="12.5">a cosmonaut cat on the Moon,</text>
    <text x="166" y="112" fill="#fff" font-size="12.5">digital illustration, soft light</text>
  </g>

  <!-- bot status -->
  <rect x="20" y="134" width="190" height="32" rx="14" fill="#182533"/>
  <text x="34" y="154" fill="#c7d3de" font-size="12.5">🎨 Generating image…</text>

  <!-- bot image reply -->
  <g>
    <rect x="20" y="178" width="270" height="228" rx="14" fill="#182533"/>
    <rect x="30" y="188" width="250" height="180" rx="10" fill="url(#img)"/>
    <!-- little moon + cat silhouette -->
    <circle cx="200" cy="245" r="34" fill="#fff" opacity="0.85"/>
    <circle cx="188" cy="238" r="6" fill="#d8d8ff" opacity="0.6"/>
    <circle cx="214" cy="255" r="9" fill="#d8d8ff" opacity="0.5"/>
    <ellipse cx="110" cy="320" rx="26" ry="30" fill="#1a1a2e"/>
    <polygon points="92,298 100,278 108,300" fill="#1a1a2e"/>
    <polygon points="120,300 128,278 134,302" fill="#1a1a2e"/>
    <circle cx="103" cy="316" r="3" fill="#18ffff"/>
    <circle cx="119" cy="316" r="3" fill="#18ffff"/>
    <text x="34" y="392" fill="#c7d3de" font-size="11.5">a cosmonaut cat on the Moon, digital…</text>
  </g>
</svg>
